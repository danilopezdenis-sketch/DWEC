<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Gestión de Usuarios</h1>

        <div class="card">
            <h2>Añadir usuario</h2>
            <form id="formUsuario" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" name="nombre" required>
                </div>
                <div class="form-group">
                    <label>Apellidos</label>
                    <input type="text" name="apellidos" required>
                </div>
                <div class="form-group">
                    <label>Localidad</label>
                    <input type="text" name="localidad">
                </div>
                <div class="form-group">
                    <label>Fotografía</label>
                    <input type="file" name="imagen" accept="image/*">
                </div>
                <button type="submit" class="btn-primary">Añadir usuario</button>
            </form>
        </div>

        <div class="card">
            <h2>Usuarios registrados</h2>
            <table>
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Nombre</th>
                        <th>Apellidos</th>
                        <th>Localidad</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaUsuarios"></tbody>
            </table>
        </div>
    </div>

    <script>
        const BUCKET = 'usuarios-daw';
        const BASE_URL = `https://${BUCKET}.s3.filebase.com`;

        async function cargarUsuarios() {
            const res = await fetch('/usuarios');
            const usuarios = await res.json();
            const tbody = document.getElementById('tablaUsuarios');
            tbody.innerHTML = '';
            usuarios.forEach(u => {
                const fotoUrl = u.imagen ? `${BASE_URL}/${u.imagen}` : '';
                tbody.innerHTML += `
          <tr>
            <td>${fotoUrl ? `<img class="foto" src="${fotoUrl}" alt="foto">` : '—'}</td>
            <td>${u.nombre}</td>
            <td>${u.apellidos}</td>
            <td>${u.localidad || '—'}</td>
            <td><button class="btn-delete" onclick="eliminar(${u.id})">Eliminar</button></td>
          </tr>`;
            });
        }

        document.getElementById('formUsuario').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            await fetch('/usuarios', { method: 'POST', body: formData });
            e.target.reset();
            cargarUsuarios();
        });

        async function eliminar(id) {
            if (!confirm('¿Seguro que quieres eliminar este usuario?')) return;
            await fetch(`/usuarios/${id}`, { method: 'DELETE' });
            cargarUsuarios();
        }

        cargarUsuarios();
    </script>
</body>

</html>
